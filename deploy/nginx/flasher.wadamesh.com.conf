# flasher.wadamesh.com — browser (Web Serial) install page.
# wadamesh.com + www  ->  redirect to the flasher (the bare domain's landing).
#
# Cloudflare fronts these; SSL "Flexible" => CF<->origin is HTTP, so listen 80.
# The page self-upgrades http->https in JS (Web Serial needs a secure context),
# since zone-wide "Always Use HTTPS" is off for the firmware's sake.

server {
    listen 80;
    listen [::]:80;
    server_name flasher.wadamesh.com;

    root /srv/wadamesh/flasher;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
    location ~ \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=300";
    }
}

# Bare domain + www -> the guided landing page (deploy/site/). Activate by pointing
# the wadamesh.com A record at the VPS in Cloudflare.
server {
    listen 80;
    listen [::]:80;
    server_name wadamesh.com www.wadamesh.com;

    root /srv/wadamesh/site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
    location ~ \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=300";
    }
}
